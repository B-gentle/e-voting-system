<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="images/gif" href="images/alumniLogo.jpg">
    <link href="css/bootstrap-grid.min.css" rel="stylesheet" type="text/css">
    <link href="css/bootstrap.min.css" rel="stylesheet" type="text/css">
    <link type="text/css" rel="stylesheet" href="css/style.css">
    <title>Register</title>
</head>

<body>
    <nav class="navbar navbar-dark bg-dark">
        <a class="navbar-brand" href="index.html">
            <img src="Images/alumniLogo.jpg" width="40" height="40" alt="" class="header_nav">
        </a>
    </nav>

    <div class="container register-form">
        <div>
            <h1 class="form-header register-header">Register</h1>
        </div>
        <div class="register-form-inside">
            <form action="login.html">
                <div class="form-group">
                    <label for="name">Full name</label>
                    <input type="text" class="form-control" id="fullName" aria-describedby="emailHelp">
                </div>
                <div class="form-group">
                    <label for="phoneNo">Enter Phone No</label>
                    <input type="tel" class="form-control" id="phoneNo">
                </div>
                <div class="form-group">
                    <label for="password">Choose Password</label>
                    <input type="password" class="form-control" id="Password">
                </div>
                <div class="form-group">
                    <label for="confirm-password">Confirm Password</label>
                    <input type="password" class="form-control" id="confirmPassword">
                </div>
                    <div class="form-group">
                        <label for="photo">Upload a Photo of Yourself</label>
                        <input type="file" class="form-control-file" id="photo" accept="image/*">
                    </div>
                <div class="form-group form-check">
                    <input type="checkbox" class="form-check-input" id="T&C">
                    <label class="form-check-label" for="T&C">Agree to T&C</label>
                </div>
                <button type="submit" class="btn btn-success">Submit</button>
            </form>
        </div>
        
    </div>


    <script src="js/jquery.js"></script>
    <script src="js/popper.js"></script>
    <script src="js/bootstrap.min.js"></script>
    
    
</body>

</html>
